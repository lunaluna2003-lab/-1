<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>먹방 실험 페이지</title>
    <style>
        /* 유튜브 썸네일 느낌을 내는 CSS */
        .thumbnail-container {
            width: 360px; /* 일반적인 모바일/웹 썸네일 크기 */
            position: relative;
            font-family: 'Apple SD Gothic Neo', sans-serif;
        }
        .thumbnail-img {
            width: 100%;
            border-radius: 12px; /* 둥근 모서리 */
            display: block;
        }
        .video-time {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
        }
        .video-title {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.4;
            color: #0f0f0f;
        }
    </style>
</head>
<body>

    <div class="thumbnail-container">
        <img src="https://여기에_깃허브_이미지_주소를_입력하세요.png" alt="먹방 썸네일" class="thumbnail-img">
        <div class="video-time">14:10</div>
        <div class="video-title">전재산 5만원 남은 지룽 마지막 배떡</div>
    </div>

</body>
</html>
